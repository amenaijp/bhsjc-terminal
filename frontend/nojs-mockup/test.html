<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap"
          rel="stylesheet">
    <title>JC test website</title>
</head>
<body class="m-0 flex flex-col min-h-dvh bg-white">

<!-- Header -->
<header class="relative flex items-center px-2 py-1">
    <button class="flex aspect-square items-center justify-center">
        <svg class="size-10 md:size-11 lg:size-14" fill="none" stroke="currentColor" stroke-width="1"
             viewBox="0 0 24 24">
            <path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>
    <h1 class="absolute inset-x-0 text-center text-5xl md:text-7xl lg:text-8xl py-2 font-[Playfair_Display_SC] pointer-events-none">
        Terminal
    </h1>
</header>

<!-- Genre selector -->
<nav class="hidden md:flex justify-center">
    <button class="font-[Playfair] text-3xl lg:text-4xl flex-1 max-w-36 lg:max-w-48 hover:cursor-pointer"> Sport
    </button>
    <button class="font-[Playfair] text-3xl lg:text-4xl flex-1 max-w-36 lg:max-w-48 hover:cursor-pointer"> Cultural
    </button>
    <button class="font-[Playfair] text-3xl lg:text-4xl flex-1 max-w-36 lg:max-w-48 hover:cursor-pointer"> Opinion
    </button>
    <button class="font-[Playfair] text-3xl lg:text-4xl flex-1 max-w-36 lg:max-w-48 hover:cursor-pointer"> School
    </button>
    <button class="font-[Playfair] text-3xl lg:text-4xl flex-1 max-w-36 lg:max-w-48 hover:cursor-pointer"> Other
    </button>
</nav>

</body>
</html>
